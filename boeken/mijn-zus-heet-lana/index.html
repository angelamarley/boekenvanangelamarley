<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mijn zus heet Lana | Online lezen</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Arial,sans-serif;color:#4b3f43;background:linear-gradient(135deg,#f9e9ee,#fffaf2,#e8f1e7)}
    header{padding:18px 16px 10px;text-align:center}
    h1{margin:0;font-family:Georgia,serif;color:#9b5368;font-size:clamp(1.8rem,5vw,3rem)}
    .subtitle{margin:.3rem 0 0}
    .reader{width:min(760px,96vw);margin:0 auto;padding:12px 12px 28px}
    .page-frame{display:flex;justify-content:center;align-items:center;min-height:55vh;padding:14px;border:1px solid rgba(157,102,116,.22);border-radius:24px;background:rgba(255,255,255,.84);box-shadow:0 18px 45px rgba(91,58,67,.18)}
    #pageImage{display:block;width:auto;max-width:100%;max-height:75vh;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.14)}
    .controls{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-top:16px}
    button,a.back{min-height:46px;padding:11px 15px;border:0;border-radius:999px;font-weight:700;text-decoration:none;cursor:pointer}
    button{color:white;background:#6f8975}
    button:last-child{background:#c96f83}
    button:disabled{opacity:.4;cursor:not-allowed}
    .counter{min-width:90px;text-align:center;font-weight:700}
    .back-row{text-align:center;margin-top:16px}
    a.back{display:inline-flex;align-items:center;color:#7c5260;background:white;border:1px solid rgba(124,82,96,.25)}
    .hint{text-align:center;font-size:.9rem;opacity:.75;margin-top:10px}
    @media(max-width:560px){.controls{grid-template-columns:1fr 1fr}.counter{grid-column:1/-1;grid-row:1}#pageImage{max-height:68vh}}
  </style>
</head>
<body>
  <header>
    <h1>Mijn zus heet Lana</h1>
    <p class="subtitle">Geschreven door Angela Marley</p>
  </header>
  <main class="reader">
    <div class="page-frame">
      <img id="pageImage" src="page-01.jpg" alt="Bladzijde 1 van Mijn zus heet Lana">
    </div>
    <div class="controls">
      <button id="previous" type="button">← Vorige bladzijde</button>
      <div class="counter"><span id="current">1</span> / 28</div>
      <button id="next" type="button">Volgende bladzijde →</button>
    </div>
    <p class="hint">Je kunt ook de pijltjestoetsen gebruiken.</p>
    <div class="back-row"><a class="back" href="../../index.html#boeken">← Terug naar mijn boeken</a></div>
  </main>
  <script>
    const totalPages=28;
    let currentPage=1;
    const image=document.getElementById('pageImage');
    const current=document.getElementById('current');
    const previous=document.getElementById('previous');
    const next=document.getElementById('next');
    const filename=page=>`page-${String(page).padStart(2,'0')}.jpg`;
    function showPage(page){
      currentPage=Math.max(1,Math.min(totalPages,page));
      image.src=filename(currentPage);
      image.alt=`Bladzijde ${currentPage} van Mijn zus heet Lana`;
      current.textContent=currentPage;
      previous.disabled=currentPage===1;
      next.disabled=currentPage===totalPages;
      if(currentPage<totalPages){const preload=new Image();preload.src=filename(currentPage+1)}
      window.scrollTo({top:0,behavior:'smooth'});
    }
    previous.addEventListener('click',()=>showPage(currentPage-1));
    next.addEventListener('click',()=>showPage(currentPage+1));
    document.addEventListener('keydown',event=>{
      if(event.key==='ArrowLeft')showPage(currentPage-1);
      if(event.key==='ArrowRight')showPage(currentPage+1);
    });
    showPage(1);
  </script>
</body>
</html>
