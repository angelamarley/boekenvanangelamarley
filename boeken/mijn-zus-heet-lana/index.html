<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mijn zus heet Lana | Online lezen</title>
  <style>
    *{box-sizing:border-box}
    :root{--rose:#c96f83;--deep:#8f5063;--sage:#6f8975;--paper:#fffdf8;--ink:#4b3f43}
    body{margin:0;min-height:100vh;font-family:Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 15% 12%,rgba(238,190,202,.35),transparent 26rem),radial-gradient(circle at 85% 25%,rgba(190,214,193,.35),transparent 25rem),linear-gradient(135deg,#f8e8ed,#fffaf2,#e7f0e6);overflow-x:hidden}
    header{padding:18px 16px 6px;text-align:center}
    h1{margin:0;color:var(--deep);font-family:Georgia,serif;font-size:clamp(1.9rem,5vw,3.1rem)}
    .subtitle{margin:.35rem 0 0}
    .reader{width:min(900px,96vw);margin:0 auto;padding:12px 12px 30px}
    .book-stage{position:relative;perspective:1800px;min-height:min(76vh,760px);display:flex;align-items:center;justify-content:center;padding:20px 10px}
    .book{position:relative;width:min(520px,88vw);aspect-ratio:1/1;transform-style:preserve-3d;filter:drop-shadow(0 22px 28px rgba(73,47,54,.25))}
    .book::before{content:"";position:absolute;z-index:-1;left:-14px;right:-14px;top:10px;bottom:-14px;border-radius:16px 22px 22px 16px;background:linear-gradient(90deg,#8c4f5f,#b96d7f 12%,#7f4756);box-shadow:inset 0 0 0 2px rgba(255,215,150,.25)}
    .book::after{content:"";position:absolute;z-index:5;top:2%;bottom:2%;left:0;width:18px;pointer-events:none;background:linear-gradient(90deg,rgba(69,40,46,.28),rgba(255,255,255,.08),transparent);border-radius:12px 0 0 12px}
    .page{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:10px;border-radius:9px 18px 18px 9px;background:linear-gradient(90deg,rgba(165,121,87,.08),transparent 5%),var(--paper);box-shadow:inset 0 0 0 1px rgba(150,105,83,.16),0 7px 18px rgba(50,30,35,.16);transform-origin:left center;transform-style:preserve-3d;backface-visibility:hidden;overflow:hidden}
    .page img{display:block;width:100%;height:100%;object-fit:contain;border-radius:6px 13px 13px 6px;user-select:none;-webkit-user-drag:none}
    .page.turn-next{animation:turnNext .72s cubic-bezier(.55,.05,.2,1) forwards;z-index:10}
    .page.turn-prev{transform:rotateY(-180deg);animation:turnPrev .72s cubic-bezier(.55,.05,.2,1) forwards;z-index:10}
    @keyframes turnNext{0%{transform:rotateY(0deg)}45%{box-shadow:-22px 8px 30px rgba(40,23,28,.28)}100%{transform:rotateY(-180deg)}}
    @keyframes turnPrev{0%{transform:rotateY(-180deg)}55%{box-shadow:-22px 8px 30px rgba(40,23,28,.28)}100%{transform:rotateY(0deg)}}
    .page-number{position:absolute;right:20px;bottom:14px;z-index:20;min-width:42px;padding:4px 9px;border-radius:999px;text-align:center;font-weight:700;font-size:.84rem;color:#78515e;background:rgba(255,255,255,.83);box-shadow:0 3px 10px rgba(70,44,51,.12)}
    .controls{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;width:min(680px,100%);margin:6px auto 0}
    button,a.back{min-height:48px;padding:11px 16px;border:0;border-radius:999px;font-weight:700;text-decoration:none;cursor:pointer;transition:transform .18s ease,filter .18s ease}
    button:hover:not(:disabled),a.back:hover{transform:translateY(-2px);filter:brightness(1.04)}
    button{color:white;background:var(--sage)}button:last-child{background:var(--rose)}button:disabled{opacity:.38;cursor:not-allowed}
    .counter{min-width:100px;text-align:center;font-weight:700}.hint{margin:12px 0 0;text-align:center;font-size:.9rem;opacity:.72}.back-row{text-align:center;margin-top:16px}
    a.back{display:inline-flex;align-items:center;color:#7c5260;background:white;border:1px solid rgba(124,82,96,.25)}
    @media(max-width:600px){.book-stage{min-height:64vh;padding:8px 4px}.book{width:min(92vw,470px)}.controls{grid-template-columns:1fr 1fr}.counter{grid-column:1/-1;grid-row:1}.page-number{right:14px;bottom:10px}}
    @media(prefers-reduced-motion:reduce){.page.turn-next,.page.turn-prev{animation-duration:.01ms}*{scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <header><h1>Mijn zus heet Lana</h1><p class="subtitle">Geschreven door Angela Marley</p></header>
  <main class="reader">
    <section class="book-stage" aria-label="Digitale boeklezer">
      <div class="book" id="book"><div class="page" id="page"><img id="pageImage" src="page-01.jpg" alt="Bladzijde 1 van Mijn zus heet Lana"><span class="page-number">1</span></div></div>
    </section>
    <div class="controls"><button id="previous" type="button">← Vorige bladzijde</button><div class="counter"><span id="current">1</span> / 28</div><button id="next" type="button">Volgende bladzijde →</button></div>
    <p class="hint">Klik op de knoppen, gebruik de pijltjestoetsen of veeg op je telefoon. Elke bladzijde slaat echt om.</p>
    <div class="back-row"><a class="back" href="../../index.html#boeken">← Terug naar mijn boeken</a></div>
  </main>
  <script>
    const totalPages=28;let currentPage=1;let busy=false;
    const book=document.getElementById('book');let page=document.getElementById('page');
    const current=document.getElementById('current'),previous=document.getElementById('previous'),next=document.getElementById('next');
    const filename=n=>`page-${String(n).padStart(2,'0')}.jpg`;
    function updateControls(){current.textContent=currentPage;previous.disabled=busy||currentPage===1;next.disabled=busy||currentPage===totalPages}
    function makePage(n){const el=document.createElement('div');el.className='page';el.innerHTML=`<img src="${filename(n)}" alt="Bladzijde ${n} van Mijn zus heet Lana"><span class="page-number">${n}</span>`;return el}
    function turn(direction){if(busy)return;const target=currentPage+direction;if(target<1||target>totalPages)return;busy=true;updateControls();const incoming=makePage(target);book.appendChild(incoming);if(direction>0){incoming.style.zIndex='1';page.style.zIndex='10';page.classList.add('turn-next')}else{incoming.style.zIndex='10';incoming.classList.add('turn-prev');page.style.zIndex='1'}setTimeout(()=>{page.remove();page=incoming;page.classList.remove('turn-next','turn-prev');page.style.transform='';page.style.zIndex='';currentPage=target;busy=false;updateControls();if(currentPage<totalPages){const i=new Image();i.src=filename(currentPage+1)}if(currentPage>1){const i=new Image();i.src=filename(currentPage-1)}},740)}
    previous.addEventListener('click',()=>turn(-1));next.addEventListener('click',()=>turn(1));
    document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')turn(-1);if(e.key==='ArrowRight')turn(1)});
    let touchStartX=null;book.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].clientX},{passive:true});book.addEventListener('touchend',e=>{if(touchStartX===null)return;const d=e.changedTouches[0].clientX-touchStartX;if(Math.abs(d)>45)turn(d<0?1:-1);touchStartX=null},{passive:true});
    updateControls();
  </script>
</body>
</html>
